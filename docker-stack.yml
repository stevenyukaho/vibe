version: "3.7"

services:
  vibe:
    image: vibe:latest
    volumes:
      - ./data:/app/backend/data
    environment:
      - DB_PATH=./data/agent-testing.db
      - DEFAULT_TIMEOUT=120000
      - BACKEND_TIMEOUT=120000
    networks:
      - network_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        traefik.enable: "true"
        traefik.docker.network: "network_public"
        traefik.http.routers.vibe.entrypoints: "websecure"
        traefik.http.routers.vibe.rule: "Host(`vibe.ahasolutions.ca`)"
        traefik.http.routers.vibe.service: "vibe_service"
        traefik.http.routers.vibe.tls.certresolver: "letsencryptresolver"
        traefik.http.routers.vibe.middlewares: "vibe_auth"
        traefik.http.middlewares.vibe_auth.basicauth.users: "admin:$$2y$$05$$iXqkPqGYpadh.H500IkiO.irYBfsdSWSgm46UA6Zgy8vTCkpjD53e"
        traefik.http.services.vibe_service.loadbalancer.server.port: "3001"
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
      restart_policy:
        condition: any
        delay: 10s

networks:
  network_public:
    external: true
