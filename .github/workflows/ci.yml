name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    name: TypeScript quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type checker
        run: npm run typecheck

      - name: Run TypeScript tests
        run: npm run test:ts

  dco-check:
    if: ${{ github.event_name == 'pull_request' }}
    name: DCO signoff check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO signoff
        run: |
          # For pull requests, check commits in base..head range
          # For pushes to main, check all commits in the push
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            COMMIT_RANGE="${BASE_SHA}..${HEAD_SHA}"
          else
            # For push events, check commits between the previous and current HEAD
            COMMIT_RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi
          
          # Get list of commit SHAs in the range
          COMMITS=$(git rev-list --no-merges "${COMMIT_RANGE}")
          
          if [ -z "$COMMITS" ]; then
            echo "No commits to check"
            exit 0
          fi
          
          # Check each commit for DCO signoff
          MISSING_DCO=0
          for COMMIT in $COMMITS; do
            if ! git show -s --format=%B "$COMMIT" | grep -q "^Signed-off-by:"; then
              echo "Commit $COMMIT is missing DCO signoff"
              MISSING_DCO=1
            fi
          done
          
          if [ $MISSING_DCO -eq 1 ]; then
            echo "::error::One or more commits are missing DCO signoff"
            echo "Please ensure all commits include a 'Signed-off-by:' line"
            exit 1
          fi
          
          echo "All commits have DCO signoff"
